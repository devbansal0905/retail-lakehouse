services:
  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/password123
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  retail-lakehouse:
    build: .
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"                                  # real-time SSE dashboard
    environment:
      - PRODUCE_INTERVAL=${PRODUCE_INTERVAL:-2}
      - PER_TICK=${PER_TICK:-80}
      - STREAM_TRIGGER=${STREAM_TRIGGER:-5}
      - DISPLAY_TZ_OFFSET_MINUTES=${DISPLAY_TZ_OFFSET_MINUTES:-330}  # 330=IST; 0=UTC
      - APP_USER=${APP_USER:-admin}
      - APP_PASSWORD=${APP_PASSWORD:-admin123}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-flash-lite}
    volumes:
      - lakehouse-data:/data
volumes:
  lakehouse-data:
